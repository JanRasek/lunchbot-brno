name: Post lunch menu to Slack

on:
  schedule:
    # GitHub Actions cron is always UTC and never shifts for daylight saving, so a single
    # cron entry can't stay pinned to a fixed *local* time year-round. Instead, we register
    # both UTC offsets that correspond to 10:45 Prague time, and the check-schedule job
    # below figures out which one is currently correct and skips the other.
    - cron: "45 9 * * 1-5" # 10:45 CET (winter, UTC+1)
    - cron: "45 8 * * 1-5" # 10:45 CEST (summer, UTC+2)
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  check-schedule:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      should_run: ${{ steps.dst-check.outputs.should_run }}
    steps:
      - name: Determine whether this is the correct DST slot for 10:45 Prague time
        id: dst-check
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python3 - <<'PYEOF'
          import os
          from datetime import datetime, timedelta
          from zoneinfo import ZoneInfo

          event_name = os.environ["EVENT_NAME"]
          event_schedule = os.environ.get("EVENT_SCHEDULE", "")

          if event_name != "schedule":
              # Manual runs (workflow_dispatch) always proceed; only scheduled
              # runs need to pick the one matching offset and skip the other.
              should_run = True
          else:
              now_prague = datetime.now(ZoneInfo("Europe/Prague"))
              is_dst = now_prague.dst() != timedelta(0)
              expected_cron = "45 8 * * 1-5" if is_dst else "45 9 * * 1-5"
              should_run = event_schedule == expected_cron

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")

          print(f"event_name={event_name} event_schedule={event_schedule!r} should_run={should_run}")
          PYEOF

  post-menu:
    needs: check-schedule
    if: needs.check-schedule.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Post lunch menu
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py --save-pdf --report-url "https://janrasek.github.io/lunchbot-brno/latest.pdf"

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp reports/lunch_menu_*.pdf site/latest.pdf
          cp reports/lunch_menu_*.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
