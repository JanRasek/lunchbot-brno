name: Post lunch menu to Slack

on:
  # No on.schedule trigger: GitHub's own schedule queue proved unreliable on this repo
  # (observed 87 and 127 minute delays on real test runs). The reliable trigger is an
  # external cron-job.org job that calls the GitHub REST API to fire workflow_dispatch
  # directly at 10:30 Europe/Prague time every weekday -- workflow_dispatch starts within
  # seconds, unlike on.schedule. Keeping only workflow_dispatch here also avoids the risk
  # of double-posting that having both triggers active would create.
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  post-menu:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Post lunch menu
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py --save-pdf --report-url "https://janrasek.github.io/lunchbot-brno/latest.pdf"

      - name: Prepare Pages site
        run: |
          mkdir -p site
          cp reports/lunch_menu_*.pdf site/latest.pdf
          cp reports/lunch_menu_*.html site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
